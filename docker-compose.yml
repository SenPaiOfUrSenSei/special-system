services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payment_portal
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payment_portal"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    network_mode: "host"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@localhost:5433/payment_portal
      - OLLAMA_BASE_URL=http://127.0.0.1:11434
    volumes:
      - ./crypto_market_data.csv:/app/crypto_market_data.csv
      - ./AI ENGINE:/app/AI ENGINE
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5174:5173"
    environment:
      - VITE_API_URL=http://localhost:8001
    depends_on:
      - backend

volumes:
  pgdata:
